name: publish

on:
  workflow_run:
    workflows: [verify]
    types: [completed]
    branches: [main]

concurrency:
  group: publish-cli
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: publish @glovebox.md/cli
    # Only when the triggering verify run passed.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Update npm for trusted publishing (OIDC)
        run: |
          npm install -g npm@latest
          npm --version

      - name: Skip while a Version Packages PR is still open
        id: pending
        shell: bash
        run: |
          set -euo pipefail
          if find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' | grep -q .; then
            echo "pending=true" >> "$GITHUB_OUTPUT"
            echo "Pending changesets exist — the Version Packages PR isn't merged yet; skipping."
          else
            echo "pending=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect if publish is needed
        if: steps.pending.outputs.pending == 'false'
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          name="$(jq -r .name apps/cli/package.json)"
          version="$(jq -r .version apps/cli/package.json)"
          if [ "$(npm view "$name@$version" version 2>/dev/null || true)" = "$version" ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "$name@$version is already on the registry; nothing to publish."
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "Will publish $name@$version."
          fi

      - name: Publish to npm (OIDC)
        if: steps.detect.outputs.publish == 'true'
        run: pnpm exec changeset publish

      - name: Push release tag
        if: steps.detect.outputs.publish == 'true'
        run: git push origin --tags

      - name: CLI install smoke test
        if: steps.detect.outputs.publish == 'true'
        shell: bash
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"; cd "$tmp"
          npm init -y >/dev/null
          # The npm CDN can lag a few seconds behind publish — retry briefly.
          for attempt in 1 2 3 4 5; do
            if npm install @glovebox.md/cli --no-audit --no-fund; then break; fi
            echo "install attempt $attempt failed; sleeping 10s..."; sleep 10
          done
          ./node_modules/.bin/glovebox --version
          ./node_modules/.bin/glovebox --help
